name: Deploy Branch to Staging

on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'Branch or SHA to deploy (e.g. feat/my-feature)'
        required: true
      skip_edge_functions:
        description: 'Skip edge function deploy (faster for agent-only changes)'
        required: false
        default: 'false'
        type: boolean

concurrency:
  group: deploy-staging
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

env:
  AGENT_IMAGE: ghcr.io/cisecsl/aisac/agent
  SERVER_IMAGE: ghcr.io/cisecsl/aisac/server

jobs:
  prepare:
    name: Prepare (${{ github.event.inputs.ref }})
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref }}
          fetch-depth: 0

      - name: Run tests
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true

      - run: go test -v -race ./...

      - name: Determine version
        id: version
        run: echo "version=$(git describe --tags --always 2>/dev/null || echo 'dev')" >> "$GITHUB_OUTPUT"

  deploy-edge-functions:
    name: Deploy Edge Functions
    needs: prepare
    if: github.event.inputs.skip_edge_functions != 'true'
    uses: ./.github/workflows/_deploy-functions.yml
    with:
      environment: staging
      ref: ${{ github.event.inputs.ref }}
    secrets:
      supabase_access_token: ${{ secrets.SUPABASE_STAGING_ACCESS_TOKEN }}
      supabase_project_id: ${{ secrets.SUPABASE_STAGING_PROJECT_ID }}

  docker-push:
    name: Push Docker Images
    needs: prepare
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref }}
          fetch-depth: 0

      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push agent
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile.agent
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.AGENT_IMAGE }}:staging
            ${{ env.AGENT_IMAGE }}:staging-${{ github.sha }}
          build-args: |
            VERSION=${{ needs.prepare.outputs.version }}
            COMMIT=${{ github.sha }}
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push server
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile.server
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.SERVER_IMAGE }}:staging
            ${{ env.SERVER_IMAGE }}:staging-${{ github.sha }}
          build-args: |
            VERSION=${{ needs.prepare.outputs.version }}
            COMMIT=${{ github.sha }}
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  summary:
    name: Summary
    needs: [prepare, deploy-edge-functions, docker-push]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Post summary
        run: |
          STATUS="✅ SUCCESS"
          if [[ "${{ needs.docker-push.result }}" != "success" ]]; then
            STATUS="❌ FAILED"
          fi
          echo "## $STATUS — Feature Branch Staging Deploy" >> "$GITHUB_STEP_SUMMARY"
          echo "| | |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Branch** | \`${{ github.event.inputs.ref }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Version** | \`${{ needs.prepare.outputs.version }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Deployed by** | ${{ github.actor }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Edge Functions** | ${{ needs.deploy-edge-functions.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Docker Push** | ${{ needs.docker-push.result }} |" >> "$GITHUB_STEP_SUMMARY"

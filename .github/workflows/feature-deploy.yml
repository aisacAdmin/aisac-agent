name: Deploy Branch to Staging

on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'Branch or SHA to deploy (e.g. feature/my-feature)'
        required: true
        default: 'main'
      skip_migrations:
        description: 'Skip edge function deploy (faster for agent-only changes)'
        required: false
        default: 'false'
        type: boolean

concurrency:
  group: deploy-staging
  cancel-in-progress: false  # queue behind any in-progress staging deploy

env:
  REGISTRY: ghcr.io
  AGENT_IMAGE: ghcr.io/cisecsl/aisac/agent
  SERVER_IMAGE: ghcr.io/cisecsl/aisac/server

permissions:
  contents: read
  packages: write

jobs:
  build-and-test:
    name: Build & Test (${{ github.event.inputs.ref }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.ref }}
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache: true

      - name: Determine version
        id: version
        run: echo "version=$(git describe --tags --always --dirty 2>/dev/null || echo 'dev')" >> "$GITHUB_OUTPUT"

      - name: Run tests
        run: go test -v -race ./...

      - name: Build binaries
        run: make build

  deploy-edge-functions:
    name: Deploy Edge Functions (Staging)
    needs: build-and-test
    runs-on: ubuntu-latest
    environment: staging
    if: github.event.inputs.skip_migrations != 'true'

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.ref }}

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy functions with retry
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_STAGING_ACCESS_TOKEN }}
          PROJECT_REF: ${{ secrets.SUPABASE_STAGING_PROJECT_ID }}
        run: |
          deploy_function() {
            local func=$1
            local attempt=0
            local max_attempts=5
            local delay=15

            echo "Deploying $func..."
            while true; do
              if supabase functions deploy "$func" --project-ref "$PROJECT_REF"; then
                echo "Successfully deployed $func"
                return 0
              fi
              attempt=$((attempt + 1))
              if [ $attempt -ge $max_attempts ]; then
                echo "::error::Failed to deploy $func after $max_attempts attempts"
                return 1
              fi
              echo "::warning::Attempt $attempt failed for $func. Retrying in ${delay}s..."
              sleep $delay
              delay=$((delay * 2))
            done
          }

          failed=0
          for func_dir in supabase/functions/*/; do
            func=$(basename "$func_dir")
            if [ ! -f "supabase/functions/$func/index.ts" ]; then
              echo "Skipping $func (no index.ts)"
              continue
            fi
            deploy_function "$func" || failed=1
          done

          if [ $failed -ne 0 ]; then
            exit 1
          fi

  docker-push:
    name: Push Docker Images (Staging)
    needs: build-and-test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.ref }}
          fetch-depth: 0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push agent
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile.agent
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.AGENT_IMAGE }}:staging
            ${{ env.AGENT_IMAGE }}:staging-${{ github.sha }}
          build-args: |
            VERSION=${{ needs.build-and-test.outputs.version }}
            COMMIT=${{ github.sha }}
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push server
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile.server
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.SERVER_IMAGE }}:staging
            ${{ env.SERVER_IMAGE }}:staging-${{ github.sha }}
          build-args: |
            VERSION=${{ needs.build-and-test.outputs.version }}
            COMMIT=${{ github.sha }}
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  summary:
    name: Deployment Summary
    runs-on: ubuntu-latest
    needs: [build-and-test, deploy-edge-functions, docker-push]
    if: always()

    steps:
      - name: Post summary
        run: |
          if [ "${{ needs.docker-push.result }}" = "success" ]; then
            EMOJI="✅"
            STATUS="SUCCESS"
          else
            EMOJI="❌"
            STATUS="FAILED"
          fi
          echo "## $EMOJI Feature Branch Staging Deploy — $STATUS" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** \`${{ github.event.inputs.ref }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** \`${{ needs.build-and-test.outputs.version }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Deployed by:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "**Edge functions skipped:** ${{ github.event.inputs.skip_migrations }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Build & Test | ${{ needs.build-and-test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Edge Functions | ${{ needs.deploy-edge-functions.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Docker Push | ${{ needs.docker-push.result }} |" >> $GITHUB_STEP_SUMMARY

name: Deploy Production

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "DEPLOY" to confirm production deployment'
        required: true
        type: string

concurrency:
  group: deploy-production
  cancel-in-progress: false

permissions:
  contents: write
  packages: write

env:
  AGENT_IMAGE: ghcr.io/cisecsl/aisac/agent
  SERVER_IMAGE: ghcr.io/cisecsl/aisac/server

jobs:
  prepare:
    name: Pre-deploy Validation
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Validate manual confirmation
        if: github.event_name == 'workflow_dispatch'
        run: |
          if [ "${{ github.event.inputs.confirm }}" != "DEPLOY" ]; then
            echo "::error::You must type DEPLOY to confirm production deployment"
            exit 1
          fi

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine version
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            echo "version=$(git describe --tags --always 2>/dev/null || echo 'dev')" >> "$GITHUB_OUTPUT"
          fi

  deploy-edge-functions:
    name: Deploy Edge Functions
    needs: prepare
    uses: ./.github/workflows/_deploy-functions.yml
    with:
      environment: production
    secrets:
      supabase_access_token: ${{ secrets.SUPABASE_PRODUCTION_ACCESS_TOKEN }}
      supabase_project_id: ${{ secrets.SUPABASE_PRODUCTION_PROJECT_ID }}

  docker-push:
    name: Push Docker Images
    needs: prepare
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata (agent)
        id: meta-agent
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.AGENT_IMAGE }}
          tags: |
            type=raw,value=latest
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      - name: Build and push agent
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile.agent
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta-agent.outputs.tags }}
          labels: ${{ steps.meta-agent.outputs.labels }}
          build-args: |
            VERSION=${{ needs.prepare.outputs.version }}
            COMMIT=${{ github.sha }}
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Docker metadata (server)
        id: meta-server
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.SERVER_IMAGE }}
          tags: |
            type=raw,value=latest
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      - name: Build and push server
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile.server
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta-server.outputs.tags }}
          labels: ${{ steps.meta-server.outputs.labels }}
          build-args: |
            VERSION=${{ needs.prepare.outputs.version }}
            COMMIT=${{ github.sha }}
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  health-check:
    name: Production Health Check
    needs: [prepare, docker-push, deploy-edge-functions]
    runs-on: ubuntu-latest
    steps:
      - name: Summary
        run: |
          echo "## ✅ Production Deployed" >> "$GITHUB_STEP_SUMMARY"
          echo "| | |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Version** | \`${{ needs.prepare.outputs.version }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Commit** | \`${{ github.sha }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Agent image** | \`${{ env.AGENT_IMAGE }}:latest\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Server image** | \`${{ env.SERVER_IMAGE }}:latest\` |" >> "$GITHUB_STEP_SUMMARY"
          # Uncomment when PRODUCTION_HEALTH_URL secret is configured:
          # for i in 1 2 3 4 5; do
          #   curl -sf "${{ secrets.PRODUCTION_HEALTH_URL }}/api/v1/health" && exit 0
          #   echo "Attempt $i failed, retrying in 30s..."; sleep 30
          # done
          # echo "::error::Health check failed after 5 attempts"; exit 1

  release:
    name: GitHub Release
    needs: [health-check]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

name: Deploy Staging

on:
  push:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "**.md"
  workflow_dispatch:
    inputs:
      ref:
        description: 'Branch or SHA to deploy (default: main)'
        required: false
        default: 'main'

concurrency:
  group: deploy-staging
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

env:
  AGENT_IMAGE: ghcr.io/cisecsl/aisac/agent
  SERVER_IMAGE: ghcr.io/cisecsl/aisac/server

jobs:
  prepare:
    name: Prepare
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      ref: ${{ steps.ref.outputs.ref }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}
          fetch-depth: 0

      - name: Resolve ref
        id: ref
        run: echo "ref=${{ github.event.inputs.ref || github.sha }}" >> "$GITHUB_OUTPUT"

      - name: Determine version
        id: version
        run: echo "version=$(git describe --tags --always 2>/dev/null || echo 'dev')" >> "$GITHUB_OUTPUT"

  deploy-edge-functions:
    name: Deploy Edge Functions
    needs: prepare
    uses: ./.github/workflows/_deploy-functions.yml
    with:
      environment: staging
      ref: ${{ needs.prepare.outputs.ref }}

  docker-push:
    name: Push Docker Images
    needs: prepare
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}
          fetch-depth: 0

      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata (agent)
        id: meta-agent
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.AGENT_IMAGE }}
          tags: |
            type=raw,value=staging
            type=sha,prefix=staging-

      - name: Build and push agent
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile.agent
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta-agent.outputs.tags }}
          labels: ${{ steps.meta-agent.outputs.labels }}
          build-args: |
            VERSION=${{ needs.prepare.outputs.version }}
            COMMIT=${{ github.sha }}
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Docker metadata (server)
        id: meta-server
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.SERVER_IMAGE }}
          tags: |
            type=raw,value=staging
            type=sha,prefix=staging-

      - name: Build and push server
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile.server
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta-server.outputs.tags }}
          labels: ${{ steps.meta-server.outputs.labels }}
          build-args: |
            VERSION=${{ needs.prepare.outputs.version }}
            COMMIT=${{ github.sha }}
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  summary:
    name: Summary
    needs: [prepare, deploy-edge-functions, docker-push]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Post summary
        run: |
          STATUS="✅ SUCCESS"
          if [[ "${{ needs.docker-push.result }}" != "success" || "${{ needs.deploy-edge-functions.result }}" != "success" ]]; then
            STATUS="❌ FAILED"
          fi
          echo "## $STATUS — Staging Deploy" >> "$GITHUB_STEP_SUMMARY"
          echo "| | |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Version** | \`${{ needs.prepare.outputs.version }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Commit** | \`${{ github.sha }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Agent image** | \`${{ env.AGENT_IMAGE }}:staging\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Server image** | \`${{ env.SERVER_IMAGE }}:staging\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Edge Functions** | ${{ needs.deploy-edge-functions.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Docker Push** | ${{ needs.docker-push.result }} |" >> "$GITHUB_STEP_SUMMARY"
